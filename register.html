<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - DragonGameZone</title>
    <link rel="stylesheet" href="./websitegame.css">
    <style>
        .auth-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
            padding: 20px 0;
        }
        .auth-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 450px;
        }
        .auth-container h2 {
            text-align: center;
            color: #ff4757;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #2f3542;
            font-size: 14px;
            font-weight: bold;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            transition: 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #ff4757;
        }
        .btn-submit {
            width: 100%;
            background-color: #ff4757;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }
        .btn-submit:hover {
            background-color: #ff2a3f;
        }
        .auth-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #747d8c;
        }
        .auth-footer a {
            color: #ff4757;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <a href="websitegame.html" style="text-decoration: none; color: inherit;">DragonGameZone</a>
        </div>
    </nav>

    <div class="auth-wrapper">
        <div class="auth-container">
            <h2>Daftar Akun Baru</h2>
            <form id="formRegister">
                <div class="form-group">
                    <label for="nama">Nama Lengkap</label>
                    <input type="text" id="nama" placeholder="Masukkan nama lengkap" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Masukkan alamat email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Buat password minimal 6 karakter" required>
                </div>
                <div class="form-group">
                    <label for="confirm-password">Konfirmasi Password</label>
                    <input type="password" id="confirm-password" placeholder="Ulangi password pendaftaran" required>
                </div>
                <button type="submit" class="btn-submit">Daftar Sekarang</button>
            </form>

            <script>
                document.getElementById('formRegister').addEventListener('submit', function(e) {
                    e.preventDefault();
                    
                    const nama = document.getElementById('nama').value;
                    const email = document.getElementById('email').value;
                    const password = document.getElementById('password').value;
                    const confirm_password = document.getElementById('confirm-password').value;

                    fetch('/api/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ nama, email, password, confirm_password })
                    })
                    .then(res => res.json())
                    .then(data => {
                        alert(data.message);
                        if (data.status === 'success') {
                            window.location.href = 'websitegame.html';
                        }
                    });
                });
            </script>
            <div class="auth-footer">
                Sudah punya akun? <a href="login.html">Masuk di sini</a>
            </div>
        </div>
    </div>
</body>
</html>
